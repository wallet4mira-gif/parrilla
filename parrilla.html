<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Parrilla 3D</title>
    <!-- Cargamos la librería oficial del visor -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        model-viewer { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

    <!-- Busca el archivo de la parrilla directamente en la misma carpeta del repositorio -->
    <model-viewer 
        src="parrilla.glb" 
        alt="Modelo 3D de Parrilla" 
        auto-rotate 
        camera-controls 
        ar>
    </model-viewer>

</body>
</html>
