<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrilla 3D</title>
    <!-- Cargamos la librería oficial -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>

    <!-- Usamos la URL cruda directa del CDN que no bloquea el navegador -->
    <model-viewer 
        src="https://githubusercontent.com" 
        alt="Parrilla Flama Grill" 
        auto-rotate 
        camera-controls 
        ar>
    </model-viewer>

</body>
</html>
